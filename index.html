      modal:{title:"DRC and Ebola — the recurrence pattern", body:"This is DRC's 17th recorded Ebola outbreak since the virus was first identified there in 1976. The previous outbreak (Zaire strain, smaller-scale) ended only 5 months ago.\n\n― BUNDIBUGYO STRAIN — PRIOR vs CURRENT ―\n\n2007 Uganda (Bundibugyo District, first identification)\n   149 cases · 37 deaths · CFR 25%\n\n2012 DRC (Province Orientale)\n   59 cases · 34 deaths · CFR 58%\n\n2026 DRC + Uganda (CURRENT, as of 27 May)\n   906 suspected, 105 confirmed · 233 deaths · still rising\n\nThe current outbreak is already 6× larger by case count than the 2007 Bundibugyo outbreak — and 15× larger than 2012. CFR is too early to calculate cleanly because most cases are recent and unresolved.\n\nThe Equatorial rainforest belt of north-eastern DRC sits at the intersection of three drivers — wildlife reservoirs (fruit bats), high human-bushmeat contact, and weak rural health infrastructure — which makes recurrence near-inevitable. What is different this time: the Bundibugyo strain (rare and under-studied), the speed of cross-border spread to Uganda, and the conflict overlay (active M23 and ADF operations in Nord-Kivu / Ituri) which has historically taken 6–12 months off response timelines.", sources:[{label:"CNN: DRC's repeat outbreaks", url:"https://www.cnn.com/2026/05/26/health/ebola-outbreak-vaccines-treatments"},{label:"Wikipedia: 2026 Ituri epidemic", url:"https://en.wikipedia.org/wiki/2026_Ituri_Province_Ebola_epidemic"},{label:"Gavi: what we know about Bundibugyo", url:"https://www.gavi.org/vaccineswork/bundibugyo-rare-virus-causing-deadly-new-ebola-outbreak-drc-has-no-vaccine-yet"}]} },

function clickable(extra = {}) {
  return {
    cursor: "pointer",
    transition: "transform 120ms ease, border-color 120ms ease, background-color 120ms ease",
    ...extra,
  };
}

function Modal({ open, payload, onClose }) {
  if (!open || !payload) return null;
  const paragraphs = (payload.body || "").split("\n\n");
  return (
    <div
      onClick={onClose}
      style={{
        position: "fixed", inset: 0, background: "rgba(8,14,28,0.55)",
        display: "flex", alignItems: "center", justifyContent: "center",
        padding: "16px", zIndex: 9999, overflowY: "auto",
      }}
    >
      <div
        onClick={(e) => e.stopPropagation()}
        style={{
          width: "100%", maxWidth: 540, background: "#fff", borderRadius: 12,
          border: `0.5px solid ${BORDER}`, padding: "20px 22px 18px",
          position: "relative", boxShadow: "0 12px 40px rgba(0,0,0,0.18)",
          maxHeight: "85vh", overflowY: "auto",
        }}
      >
        <button
          onClick={onClose}
          aria-label="Close"
          style={{
            position: "absolute", top: 10, right: 12, border: "none",
            background: "transparent", fontSize: 22, lineHeight: 1, cursor: "pointer",
            color: "#666", padding: "4px 8px",
          }}
        >×</button>
        <div style={{ color: NAVY, fontWeight: 700, fontSize: 18, lineHeight: 1.3, paddingRight: 22, marginBottom: 10 }}>
          {payload.title}
        </div>
        <div style={{ fontSize: 13, lineHeight: 1.6, color: "#222" }}>
          {paragraphs.map((p, i) => (
            <p key={i} style={{ margin: i === 0 ? "0 0 10px 0" : "0 0 10px 0" }}>{p}</p>
          ))}
        </div>
        {payload.sources && payload.sources.length > 0 && (
          <div style={{ marginTop: 14, paddingTop: 12, borderTop: `0.5px solid ${BORDER}`, display: "flex", flexWrap: "wrap", gap: 8 }}>
            {payload.sources.map((s, i) => (
              <button
                key={i}
                onClick={() => s.url && s.url !== "#" && window.open(s.url, "_blank", "noopener,noreferrer")}
                disabled={!s.url || s.url === "#"}
                style={{
                  fontSize: 12, padding: "6px 10px", borderRadius: 6,
                  border: `0.5px solid ${BORDER}`, background: SUBTLE, color: NAVY,
                  cursor: s.url && s.url !== "#" ? "pointer" : "default", fontWeight: 600,
                }}
              >
                {s.label} {s.url && s.url !== "#" ? "↗" : ""}
              </button>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function Tile({ children, onClick, style = {}, hover, setHover, id }) {
  const isHovered = hover === id;
  return (
    <div
      onClick={onClick}
      onMouseEnter={() => setHover(id)}
      onMouseLeave={() => setHover(null)}
      style={{
        ...clickable(),
        transform: isHovered ? "translateY(-1px)" : "none",
        ...style,
        borderColor: isHovered ? NAVY : (style.borderColor || BORDER),
      }}
    >
      {children}
    </div>
  );
}

            <a href={`mailto:?subject=${encodeURIComponent("BVD Outbreak — Daily Situational Picture")}&body=${encodeURIComponent("Daily situational picture of the 2026 Bundibugyo Ebola outbreak: " + (typeof window !== "undefined" ? window.location.href : ""))}`}
              style={{
                padding: "4px 9px", fontSize: 10.5, fontWeight: 600,
                background: "#fff", color: NAVY, border: `0.5px solid ${BORDER}`,
                borderRadius: 4, textDecoration: "none",
              }}>✉ Email link</a>
            <a href="https://github.com/" target="_blank" rel="noopener" style={{
              padding: "4px 9px", fontSize: 10.5, fontWeight: 600,
              background: "#fff", color: NAVY, border: `0.5px solid ${BORDER}`,
              borderRadius: 4, textDecoration: "none",
            }}>📜 View previous versions</a>
            <span style={{ color: "#999", fontSize: 10 }}>· Add to home screen on phone for one-tap access</span>
          </div>

          {/* Non-affiliation disclaimer (clickable → about) */}
          <Tile id="about-link" hover={hover} setHover={setHover}
            onClick={() => openModal(data.about_page)}
            style={{
              marginTop: 12, paddingTop: 10, borderTop: `0.5px solid ${BORDER}`,
              fontSize: 10, color: "#777", lineHeight: 1.5,
              cursor: "pointer",
            }}>
            <b>About this page:</b> Open-source situational picture aggregating publicly-available information from WHO, CDC, ECDC, national ministries of health, and reputable news outlets. <b>Not officially affiliated</b> with any UN agency, government, or humanitarian organisation. Provided for situational awareness only — not a substitute for official advisories from your organisation, employer, or relevant authorities. Verify any operational decision against primary sources linked inline. Compiled and maintained by an independent analyst. <b style={{color: BLUE}}>Click to read full methodology and sources ↗</b>
          </Tile>
        </div>
      </main>

      <Modal open={modal.open} payload={modal.payload} onClose={closeModal} />
    </div>
  );
}

function SectionHeader({ children }) {
  return (
    <div style={{
      fontSize: 11, fontWeight: 700, color: NAVY, textTransform: "uppercase", letterSpacing: 0.6,
      marginBottom: 8, paddingBottom: 4, borderBottom: `0.5px solid ${BORDER}`,
    }}>
      {children}
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<EbolaDashboard />);
  </script>
</body>
