<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BVD Outbreak Watch</title>
<style>
    body { margin: 0; background: #faf9f6; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; }
    #root { display: block; }
    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }
    *:focus-visible {
      outline: 2px solid #0A6EB4;
      outline-offset: 2px;
      border-radius: 4px;
    }
    /* Print styling — for "Export to PDF" via browser print dialog */
    @media print {
      body { background: #fff !important; }
      .no-print { display: none !important; }
      details > summary { list-style: none; }
      details[open] > summary::after, details > summary::after { content: ""; }
      details:not([open]) > div { display: block !important; }
      details:not([open]) { /* force open in print */ }
      main { max-width: 100% !important; border: none !important; border-radius: 0 !important; }
      /* Expand collapsible FAQs */
      details > div { display: block !important; }
      /* Reduce shadows + background fills for ink saving */
      * { box-shadow: none !important; }
      @page { size: A4 portrait; margin: 10mm; }
    }
    /* ===== Behind-the-numbers box: deep blood red, marked IMPORTANT ===== */
    #stat-behind {
      background: #6E0B14 !important;
      border: 1.5px solid #4A070E !important;
      box-shadow: 0 2px 10px rgba(110,11,20,0.30) !important;
      position: relative;
    }
    #stat-behind, #stat-behind * { color: #ffffff !important; }
    #stat-behind::before {
      content: "\26A0 IMPORTANT \2014 READ FIRST";
      display: inline-block;
      font-size: 10px; font-weight: 800; letter-spacing: 1px;
      background: #ffffff; color: #6E0B14;
      padding: 2px 7px; border-radius: 3px; margin-bottom: 7px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }
    #stat-behind:hover { border-color: #2E0509 !important; }
    @keyframes behindPulse { 0%,100%{ box-shadow:0 2px 10px rgba(110,11,20,0.30);} 50%{ box-shadow:0 2px 16px rgba(110,11,20,0.55);} }
    #stat-behind { animation: behindPulse 2.8s ease-in-out infinite; }
    @media print { #stat-behind { animation: none !important; } }
  </style>
</head>

  critical_alert: {
    title: "DRC death toll passes 100: 550 confirmed / 101 deaths / 309 in isolation as of 7 Jun (+35 cases, +10 deaths in a day; CFR ~18.4%). Ituri now ~94% of cases. WHO DON606 (8 Jun) and the UAE entry ban (6 Jun) stand. Uganda 19 / 2",
    body: "The DRC Ministry of Health, in figures published 8 June (data to 7 June), reported 550 confirmed cases, 101 confirmed deaths and 309 individuals hospitalised in isolation — an increase of 35 confirmed cases and 10 deaths in a day, taking the death toll past 100. Ituri remains the epicentre (518 of 550 across 17 health zones, roughly 94% of all cases); North Kivu 29; South Kivu 3. The case-fatality rate among confirmed cases is about 18.4%. This continues the sharp escalation formalised in WHO DON606 (8 June, 515/91 as of 6 June). This is the surge the earlier figures only hinted at, and it confirms the prior total should have been read as a floor. On travel, the UAE began barring entry to travellers from the DRC, Uganda and South Sudan and suspended new visa issuance from 6 June (21-day exemption; cargo continues). WHO and Africa CDC’s US$518M joint plan (5 June) is now underway.",
    modal: {
      title: "Italy MSF surgeon — full operational debrief",
      body: "― ITALY OPERATIONAL FACTS (27 May 2026) ―\nAn Italian female surgeon working with Médecins Sans Frontières (MSF) at the Salamat health centre in Bunia, Ituri (DRC) — the epicentre of the outbreak — is being repatriated under quarantine. She had direct clinical contact on 16 May with patients later confirmed positive for Bundibugyo virus, and on 18 May performed emergency life-saving surgery on a child grenade-blast victim now classified as a suspected Ebola case (test pending). She is asymptomatic; she arrives in Rome today on a specially-equipped flight authorised by the Ministero della Salute and will be placed in quarantine + active surveillance at the Istituto Nazionale per le Malattie Infettive Lazzaro Spallanzani.\n\n― OFFICIAL ITALIAN POSITION ―\nMin. della Salute: \"There are no Ebola cases in Italy. Alarm in our country remains very low.\" Italian Foreign Ministry (Farnesina) committed €1.15M to the humanitarian response in the affected DRC provinces. Lazio Region informed.\n\n― ECDC POSITION ―\nECDC states risk of infection for EU/EEA residents remains very low, but notes this outbreak \"is more challenging to control than the more commonly detected Zaire ebolavirus\" — different strain, no approved vaccine, no specific treatment.\n\n― TEDROS 27 MAY ―\nIn parallel, WHO DG published a formal statement on X today: \"Eastern DRC now faces a catastrophic collision of disease and conflict with the Ebola outbreak in Ituri province outpacing the response. Ongoing clashes are driving mass displacement, pushing exposed contacts into overcrowded camps and severing critical containment corridors. Stopping this Ebola transmission depends entirely on humanitarian access.\"\n\n― CONTEXT ON THE STRAIN ―\nBundibugyo virus is one of six known orthoebolavirus species, four of which cause Ebola disease in humans. It was first identified in 2007 after an outbreak in Uganda's Bundibugyo District, on the border with DRC. A second outbreak followed in DRC's Province Orientale in 2012 (59 cases, 34 deaths). Case-fatality rates in the two prior outbreaks ranged 30-50%.\n\nCrucially: existing licensed Ebola vaccines (Ervebo / rVSV-ZEBOV and the Janssen two-dose regimen) target the Zaire strain. Animal studies suggest only partial cross-protection against Bundibugyo. The strain was previously too rare to justify dedicated vaccine investment — a gap now being addressed urgently.\n\nThe current outbreak went undetected for several weeks because initial diagnostic tests targeted the Zaire strain and came back negative. Lab confirmation of Bundibugyo did not occur until 15 May, despite first symptoms reported on 24 April.",

      q: "Is Ebola airborne?",
      a: "No. Ebola spreads through DIRECT CONTACT with bodily fluids (blood, vomit, diarrhoea, saliva, semen, sweat) of an infected person who is showing symptoms — or with surfaces and materials freshly contaminated by those fluids. It does NOT spread through casual contact, sharing a room, breathing the same air, or through food and water."

    }, {
      q: "How does this compare to the 2014 West Africa outbreak?",
      a: "Different strain (Bundibugyo here vs Zaire then), much smaller so far (under 1,000 suspected vs 28,000+ in West Africa), but the lack of a licensed Bundibugyo vaccine is a meaningful disadvantage compared to 2014–16 when Ervebo was developed mid-outbreak. The current geographic concentration in north-east DRC is also more contained than the multi-country spread of 2014."
    }, {
      q: "Why is the case-fatality rate so high (30–50%)?",
      a: "Ebola disease, broadly, is severe — but case-fatality is partly a function of healthcare access. Patients reaching well-equipped treatment centres within 24 hours have substantially better outcomes (supportive care including fluids, blood-pressure stabilisation, and treatment of co-infections matters enormously). In remote conflict-affected zones with weak health infrastructure — like Ituri now — CFR runs higher because patients arrive later and centres are overwhelmed."

      q: "Will Europe / North America / Asia see imported cases?",
      a: "Statistically, yes — large outbreaks usually produce a small number of imported cases via travellers (humanitarian workers, medical staff, business travellers). The 2014–16 outbreak saw a handful of imported cases in Europe and the US, mostly healthcare workers being medevaced. Onward transmission in those countries is unusual because of robust healthcare-system response. The Italy near-miss on 25 May was the first suspected European cases of this outbreak (both negative)."
